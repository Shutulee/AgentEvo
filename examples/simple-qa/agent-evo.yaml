# AgentEvo 配置文件 - 简单问答 Demo
version: "1"
language: "zh"

agent:
  module: "agent"
  function: "run"
  prompt_file: "./system_prompt.md"

# 黄金测评集（用户手写）
test_cases: "./tests/gold/**/*.yaml"
# 白银测评集（mutate/import 自动生成）
silver_test_cases: "./tests/silver/**/*.yaml"

llm:
  provider: "openai"
  model: "glm-4-flash"
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"

# 评判配置
judge:
  pass_threshold: 0.7

# Tag 策略
tag_policies:
  safety:
    pass_threshold: 1.0
    required_for_release: true
  core:
    pass_threshold: 0.8
    required_for_release: true

# 优化配置
optimization:
  max_iterations: 3
  run_regression: true
  regression_threshold: 0.9

git:
  enabled: false

